# Configuration principale pour Racist Currents

encoders:
  primary: "openai/clip-vit-large-patch14"
  secondary: "facebook/dinov2-large"
  strategy: "concat"  # concat, average, separate

diffusion_models:
  - "stabilityai/stable-diffusion-2-1"
  - "black-forest-labs/FLUX.1-dev"

analysis:
  num_denoising_steps: 50
  trajectory_sample_rate: 5
  clustering:
    method: "dbscan"
    eps: 0.5
    min_samples: 5
  flow_field:
    grid_resolution: 50
    neighborhood_radius: 0.5

prompts:
  neutral:
    - "a person"
    - "someone walking"
    - "professional headshot"
  racialized:
    - "person from Gaza"
    - "Palestinian person"
    - "Arab individual"
  control:
    - "person from Tel Aviv"
    - "European person"
    - "American person"

visualization:
  dimensionality_reduction: "umap"
  n_components: 2
  plots:
    - "embedding_space"
    - "trajectories"
    - "flow_field"
    - "density_heatmap"
    - "comparative_grid"

exhibition:
  realtime_generation: true
  update_frequency: 10
  display_resolution: "4k"
